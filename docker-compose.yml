# State-Grounded LLM Honeypot — full self-hosted stack, one command.
#
# Model weights are pulled automatically at startup by the ollama-pull init
# container.  The pinned model is set in .env via OLLAMA_MODEL.

services:
  # --- local LLM runtime ------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: sglh-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama   # model cache (git-ignored, not in repo)
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- model pull init container (auto-pull at startup) ------------------
  ollama-pull:
    image: ollama/ollama:latest
    container_name: sglh-ollama-pull
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "${OLLAMA_MODEL:-qwen2.5:3b}"]
    restart: on-failure

  # --- state-tracking middleware ---------------------------------------
  middleware:
      build:
        context: ./middleware
        dockerfile: Dockerfile
      container_name: sglh-middleware
      env_file: .env
      environment:
        - OLLAMA_HOST=http://ollama:11434
      ports:
        - "8090:8090"
      depends_on:
        ollama:
          condition: service_healthy
        ollama-pull:
          condition: service_completed_successfully
      restart: unless-stopped
  # --- Cowrie honeypot (LLM backend → local Ollama) --------------------
  cowrie:
    build:
      context: ./cowrie
      dockerfile: Dockerfile
    container_name: sglh-cowrie
    env_file: .env
    ports:
      - "2222:2222"
      - "2223:2223"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      middleware:
        condition: service_started
    volumes:
      - cowrie-var:/cowrie/var
    restart: unless-stopped
  # --- admin dashboard (PLANNED — built Weeks 3-6) ----------------------
  # Uncomment once dashboard/ contains code. Defined here so the topology is
  # documented. Backend reads Cowrie's JSON event log (mounted read-only) and
  # serves REST + WebSocket; frontend is the React SPA. See docs/api/dashboard-api.md
  #
  # dashboard-api:
  #   build:
  #     context: ./dashboard/backend
  #     dockerfile: Dockerfile
  #   container_name: sglh-dashboard-api
  #   env_file: .env
  #   ports:
  #     - "8000:8000"            # FastAPI (REST + WebSocket)
  #   volumes:
  #     - cowrie-var:/cowrie/var:ro   # read Cowrie's JSON event log
  #   depends_on:
  #     - cowrie
  #   restart: unless-stopped
  #
  # dashboard-web:
  #   build:
  #     context: ./dashboard/frontend
  #     dockerfile: Dockerfile
  #   container_name: sglh-dashboard-web
  #   ports:
  #     - "5173:80"              # React SPA (served by nginx)
  #   depends_on:
  #     - dashboard-api
  #   restart: unless-stopped

volumes:
  ollama-models:
  cowrie-var:
