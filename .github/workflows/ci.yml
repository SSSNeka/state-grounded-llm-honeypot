name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install -r middleware/requirements.txt ruff

      - name: Run linter
        run: |
          ruff check .

      - name: Run tests (unit + functional)
        run: |
          PYTHONPATH=middleware/src python -m pytest -q

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate docker compose config
        run: docker compose config

      - name: Build middleware image
        run: docker build -f middleware/Dockerfile -t sglh-middleware ./middleware

      - name: Build Cowrie image
        run: docker build -f cowrie/Dockerfile -t sglh-cowrie ./cowrie

  deploy:
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd ~/state-grounded-llm-honeypot

            git fetch origin
            git reset --hard origin/main

            if [ -f .env.example ] && [ ! -f .env ]; then
              cp .env.example .env
            fi

            docker compose up -d --build
