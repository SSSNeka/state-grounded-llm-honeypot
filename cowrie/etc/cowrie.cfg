# Cowrie configuration — LLM backend pointed at a LOCAL Ollama.
# This is what makes "run Cowrie with Ollama" work. Keep `model` in sync with
# OLLAMA_MODEL in ../../.env.

[honeypot]
hostname = svr04
# Use the experimental LLM backend instead of static shell emulation.
backend = llm

[llm]
# Cowrie's LLM backend speaks the OpenAI-compatible API. Ollama exposes one at
# /v1/chat/completions and ignores the key, so any non-empty value works.
api_key = ollama
model = qwen2.5:3b
# Talk to the Ollama container by its compose service name.
host = http://ollama:11434
path = /v1/chat/completions
max_tokens = 500
temperature = 0.7
debug = false

# JSON event log — this is the stream the admin dashboard (W3-6) will read.
[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json
