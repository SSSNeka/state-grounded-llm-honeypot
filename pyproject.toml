[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".venv",
  "venv",
  "env",
  "build",
  "dist",
  ".ruff_cache",
  "htmlcov",
  "cowrie/var",
  "cowrie/data",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["middleware/tests", "tests"]
markers = [
    "integration: requires local Ollama",
]
